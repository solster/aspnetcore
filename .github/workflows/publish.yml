name: Publish NuGet Package

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore dependencies
        run: dotnet restore src/Solster.Blazor.Templating/Solster.Blazor.Templating.csproj

      - name: Build
        run: dotnet build src/Solster.Blazor.Templating/Solster.Blazor.Templating.csproj --configuration Release --no-restore

      - name: Pack
        run: >
          dotnet pack src/Solster.Blazor.Templating/Solster.Blazor.Templating.csproj
          --configuration Release
          --no-build
          --output nupkgs
          /p:Version=${{ github.ref_name }}

      - name: Push to GitHub Packages
        run: >
          dotnet nuget push nupkgs/*.nupkg
          --api-key ${{ secrets.GITHUB_TOKEN }}
          --source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
          --skip-duplicate
