name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release

  publish:
    name: Pack & Publish
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Determine version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            TIMESTAMP=$(date -u +%Y%m%d%H%M%S)
            VERSION="0.1.0-preview.${TIMESTAMP}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Package version: ${VERSION}"

      - name: Restore
        run: dotnet restore

      - name: Pack
        run: |
          mapfile -t projects < <(find ./src -name '*.csproj' | sort)
          packable_projects=()

          if [ ${#projects[@]} -eq 0 ]; then
            echo "No projects found under ./src"
            exit 1
          fi

          for project in "${projects[@]}"; do
            is_packable=$(dotnet msbuild "${project}" -nologo -getProperty:IsPackable | tr -d '\r')
            if [ "${is_packable}" = "true" ]; then
              packable_projects+=("${project}")
            fi
          done

          if [ ${#packable_projects[@]} -eq 0 ]; then
            echo "No packable projects found (IsPackable=true)."
            exit 1
          fi

          for project in "${packable_projects[@]}"; do
            echo "Packing ${project}"
            dotnet pack "${project}" \
              --no-restore \
              --configuration Release \
              --output ./artifacts \
              -p:Version=${{ steps.version.outputs.version }}
          done

      - name: Publish to GitHub Packages
        run: |
          dotnet nuget push ./artifacts/*.nupkg \
            --api-key ${{ secrets.GITHUB_TOKEN }} \
            --source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json \
            --skip-duplicate
